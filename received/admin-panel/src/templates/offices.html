{% extends "base.html" %}
{% block title %}Offices{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-building"></i> Offices</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal"><i class="fas fa-plus"></i> Add Office</button>
</div>
<div class="card">
    <div class="card-body">
        <table class="table table-hover">
            <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
                {% for o in offices %}
                <tr>
                    <td><strong>{{ o.name }}</strong></td>
                    <td>{{ o.email }}</td>
                    <td><span class="badge bg-{{ 'success' if o.is_active else 'secondary' }}">{{ 'Active' if o.is_active else 'Off' }}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#edit{{ o.id }}"><i class="fas fa-edit"></i></button>
                        <form method="POST" action="{{ url_for('delete_office', office_id=o.id) }}" class="d-inline" onsubmit="return confirm('Delete this office and all associated data?')">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <div class="modal fade" id="edit{{ o.id }}" tabindex="-1">
                    <div class="modal-dialog"><div class="modal-content">
                        <form method="POST" action="{{ url_for('edit_office', office_id=o.id) }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <div class="modal-header"><h5>Edit Office</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                            <div class="modal-body">
                                <div class="mb-3"><label>Name</label><input name="name" class="form-control" value="{{ o.name }}" required></div>
                                <div class="mb-3"><label>Email</label><input name="email" type="email" class="form-control" value="{{ o.email }}" required></div>
                                <div class="mb-3"><label>Password</label><input name="password" type="password" class="form-control" placeholder="Leave empty to keep current"></div>
                                <div class="mb-3"><label><input type="checkbox" name="is_active" {{ 'checked' if o.is_active }}> Active</label></div>
                            </div>
                            <div class="modal-footer"><button class="btn btn-primary">Save</button></div>
                        </form>
                    </div></div>
                </div>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <form method="POST" action="{{ url_for('create_office') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="modal-header"><h5>Create Office</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label>Office Name</label><input name="name" class="form-control" required></div>
                <div class="mb-3"><label>Email (login)</label><input name="email" type="email" class="form-control" required></div>
                <div class="mb-3"><label>Password</label><input name="password" type="password" class="form-control" required></div>
            </div>
            <div class="modal-footer"><button class="btn btn-primary">Create</button></div>
        </form>
    </div></div>
</div>
{% endblock %}
