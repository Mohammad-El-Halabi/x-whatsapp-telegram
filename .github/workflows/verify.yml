name: Verify unified application

on:
  push:
    branches: [main]
  pull_request:

jobs:
  database-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Create Supabase compatibility objects
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres <<'SQL'
          create schema auth;
          create table auth.users(id uuid primary key);
          create role anon nologin;
          create role authenticated nologin;
          create function auth.uid() returns uuid language sql stable as $$ select null::uuid $$;
          SQL
      - name: Apply database migrations
        run: |
          for migration in received/admin-panel/supabase/migrations/*.sql; do
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -f "$migration"
          done
      - name: Verify account and platform constraints
        run: |
          psql -v ON_ERROR_STOP=1 -h localhost -U postgres <<'SQL'
          insert into auth.users(id) values ('11111111-1111-1111-1111-111111111111');
          insert into public.offices(id,name,email)
          values ('22222222-2222-2222-2222-222222222222','Test','test@example.com');
          insert into public.users(id,email,full_name,office_id)
          values ('11111111-1111-1111-1111-111111111111','staff@example.com','Staff','22222222-2222-2222-2222-222222222222');
          update public.users set role = 'manager' where id = '11111111-1111-1111-1111-111111111111';
          insert into public.staff_assignments(user_id,platform,phone_number,gateway_number,account_slot)
          values
            ('11111111-1111-1111-1111-111111111111','telegram','+10000000000','account-1',1),
            ('11111111-1111-1111-1111-111111111111','whatsapp','+10000000000','account-1',1);
          insert into public.staff_assignments(user_id,platform,phone_number,gateway_number,account_slot)
          values
            ('11111111-1111-1111-1111-111111111111','signal','+10000000000','signal-main',null),
            ('11111111-1111-1111-1111-111111111111','sms','+10000000000','sms-main',null);
          update public.staff_assignments
          set phone_number = '+19999999999'
          where user_id = '11111111-1111-1111-1111-111111111111' and account_slot = 1;
          delete from public.staff_assignments
          where user_id = '11111111-1111-1111-1111-111111111111' and account_slot = 1;
          SQL
          if psql -v ON_ERROR_STOP=1 -h localhost -U postgres <<'SQL'
          insert into public.staff_assignments(user_id,platform,phone_number,gateway_number,account_slot)
          values ('11111111-1111-1111-1111-111111111111','telegram','+10000000000','account-2',2);
          SQL
          then
            echo "Database accepted an incomplete account pair"
            exit 1
          fi
          if psql -v ON_ERROR_STOP=1 -h localhost -U postgres <<'SQL'
          insert into public.staff_assignments(user_id,platform,phone_number,gateway_number,account_slot)
          values ('11111111-1111-1111-1111-111111111111','signal','+10000000000','invalid-slot',2);
          SQL
          then
            echo "Database accepted a Signal assignment with a paired account slot"
            exit 1
          fi
          if psql -v ON_ERROR_STOP=1 -h localhost -U postgres <<'SQL'
          insert into public.staff_assignments(user_id,platform,phone_number,gateway_number,account_slot)
          values
            ('11111111-1111-1111-1111-111111111111','telegram','+10000000001','account-3',3),
            ('11111111-1111-1111-1111-111111111111','whatsapp','+10000000002','account-3',3);
          SQL
          then
            echo "Database accepted mismatched phone numbers in one account pair"
            exit 1
          fi

  frontend-and-rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: unified-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            unified-app/package-lock.json
            unified-app/sidecar/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies safely
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install sidecar dependencies safely
        working-directory: unified-app/sidecar
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Type-check and build frontend
        run: npm run build
      - name: Build Telegram sidecar resource
        working-directory: unified-app/telegram-sidecar
        run: |
          python -m pip install --requirement requirements.txt pyinstaller==6.21.0
          python -m PyInstaller --clean --noconfirm telegram-sidecar.spec
      - name: Check Rust backend
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  python-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile received Python source
        run: |
          python -m compileall -q received/admin-panel/src received/telegram-client/src received/signal-client/src received/sms-client/src unified-app/telegram-sidecar
